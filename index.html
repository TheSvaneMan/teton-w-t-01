<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Teton Walkie-Talkie</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        />

        <link href="/dist/output.css" rel="stylesheet" />
        <link rel="stylesheet" href="/css/main.css" />

        <script
            type="module"
            src="https://esm.run/@material/web/all.js"
        ></script>
    </head>
    <body
        class="bg-gray-100 min-h-screen flex items-center justify-center font-['Roboto'] antialiased"
    >
        <div
            class="relative bg-white p-8 rounded-[28px] flex flex-col gap-6 w-full max-w-md text-center mx-4"
        >
            <md-elevation></md-elevation>

            <div>
                <md-icon class="text-6xl text-[#7c3aed] mb-2"
                    >cell_tower</md-icon
                >
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">
                    Teton Walkie-Talkie
                </h1>
                <p class="text-gray-600 mt-1 font-medium">
                    Secure Peer-to-Peer Comms
                </p>
            </div>

            <div class="flex flex-col gap-2 text-left">
                <label class="text-sm font-medium text-gray-700 px-1"
                    >Select Channel</label
                >
                <select
                    class="w-full p-4 rounded-xl border border-gray-300 bg-gray-50 focus:ring-2 focus:ring-[#7c3aed] focus:outline-none transition-all cursor-pointer text-gray-800"
                    onchange="selectRoom(this)"
                >
                    <option value="" disabled selected>Choose a Ward...</option>
                    <option value="GeneralWard">General Ward</option>
                    <option value="ICU">Intensive Care Unit</option>
                    <option value="NICU">Neonatal Intensive Care Unit</option>
                    <option value="PediatricWard">Pediatric Ward</option>
                    <option value="MaternityWard">Maternity Ward</option>
                    <option value="GeriatricWard">Geriatric Ward</option>
                    <option value="PsychiatricWard">Psychiatric Ward</option>
                    <option value="IsolationWard">Isolation Ward</option>
                    <option value="OncologyWard">Oncology Ward</option>
                    <option value="CCU">Cardiac Care Unit</option>
                </select>
            </div>

            <div class="flex flex-col gap-3 mt-2">
                <md-filled-button
                    onclick="generateURL()"
                    style="
                        --md-sys-color-primary: #7c3aed;
                        --md-sys-color-on-primary: #ffffff;
                    "
                >
                    <md-icon slot="icon">login</md-icon>
                    Join Room
                </md-filled-button>

                <a href="about.html" class="inline-block">
                    <md-text-button class="w-full">
                        <md-icon slot="icon">help_outline</md-icon>
                        About this project
                    </md-text-button>
                </a>
            </div>
        </div>

        <script src="./js/roomHandler.js"></script>
    </body>
</html>
