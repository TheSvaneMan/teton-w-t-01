<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Active Call | Teton</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        />

        <link href="/dist/output.css" rel="stylesheet" />
        <link rel="stylesheet" href="/css/main.css" />
        <script
            type="module"
            src="https://esm.run/@material/web/all.js"
        ></script>
    </head>
    <body
        class="bg-gray-100 min-h-screen flex items-center justify-center p-4 font-['Roboto'] antialiased m-0"
    >
        <div
            class="bg-white p-6 md:p-8 rounded-[28px] shadow-lg border border-gray-100 w-full max-w-5xl flex flex-col gap-6"
        >
            <header
                class="w-full p-4 flex justify-between items-center bg-gray-50 rounded-2xl border border-gray-200 text-gray-800"
            >
                <div class="flex items-center gap-3">
                    <div
                        class="relative flex h-4 w-4 items-center justify-center"
                    >
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
                        ></span>
                        <span
                            class="relative inline-flex rounded-full h-3 w-3 bg-green-500"
                        ></span>
                    </div>
                    <span class="font-bold text-lg tracking-tight"
                        >Secure Channel Active</span
                    >
                </div>
                <a href="index.html">
                    <md-filled-button
                        style="
                            --md-sys-color-primary: #ef4444;
                            --md-sys-color-on-primary: #ffffff;
                        "
                    >
                        <md-icon slot="icon">call_end</md-icon>
                        Leave Room
                    </md-filled-button>
                </a>
            </header>

            <main class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                <div
                    class="relative bg-black rounded-[24px] overflow-hidden shadow-sm flex items-center justify-center aspect-video max-h-[400px]"
                >
                    <div
                        class="absolute top-4 left-4 bg-black/50 backdrop-blur-md text-white px-3 py-1.5 rounded-full text-sm font-medium z-10 flex items-center gap-2 border border-white/10"
                    >
                        <md-icon class="text-sm">person</md-icon> You
                    </div>
                    <video
                        id="localVideo"
                        autoplay
                        playsinline
                        class="w-full h-full object-cover transform scale-x-[-1]"
                    ></video>
                </div>

                <div
                    class="relative bg-black rounded-[24px] overflow-hidden shadow-sm flex items-center justify-center aspect-video max-h-[400px]"
                >
                    <div
                        class="absolute top-4 left-4 bg-[#7c3aed]/90 backdrop-blur-md text-white px-3 py-1.5 rounded-full text-sm font-medium z-10 flex items-center gap-2 shadow-md"
                    >
                        <md-icon class="text-sm">record_voice_over</md-icon>
                        Remote Peer
                    </div>
                    <video
                        id="remoteVideo"
                        autoplay
                        playsinline
                        class="w-full h-full object-cover"
                    ></video>
                </div>
            </main>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>
